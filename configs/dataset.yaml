dataset:
  name: dl3dv

  # Raw DL3DV download from Hugging Face
  raw_root: /mnt/d/cs599/datasets/dl3dv

  # Processed training-ready dataset used by your dataloader
  root: /mnt/d/cs599/datasets/dl3dv_processed

  # The Hugging Face page you linked is the 480P release
  source_resolution: 480P

  # Start small for faster debugging
  subset: 1K

  # Your model input size after preprocessing
  image_height: 256
  image_width: 448

  # Files created by your preprocessing/indexing step
  train_index: /data/dl3dv_processed/train/index.json
  val_index: /data/dl3dv_processed/val/index.json

  # View sampling
  num_context_views: 4
  num_target_views: 1
  min_views_per_scene: 5
  max_views_per_scene: 12
  min_frame_gap: 8
  max_frame_gap: 48

  # Camera / image settings
  camera_convention: nerfstudio
  normalize_rgb: true
  center_crop: false
  resize_mode: bilinear

  # Loader settings
  batch_size: 2
  num_workers: 4
  pin_memory: true
  shuffle_train: true
  shuffle_val: false
  drop_last_train: true